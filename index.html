<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="description" content="브라우저 내장 음성인식·합성만으로 동작하는 무료 OPIc 실전 연습 + 발화 분석 트레이너 (API 비용 0원)">
<meta name="theme-color" content="#2563eb">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎙️</text></svg>">
<title>OPIc AL 트레이너</title>
<style>
  :root {
    --bg: #ffffff;
    --panel: #ffffff;
    --panel-2: #f1f5f9;
    --border: #e2e8f0;
    --text: #0f172a;
    --muted: #64748b;
    --accent: #2563eb;
    --accent-dim: rgba(37, 99, 235, 0.1);
    --good: #16a34a;
    --warn: #b45309;
    --warn-dim: rgba(245, 158, 11, 0.1);
    --bad: #dc2626;
    --tooltip-bg: #0f172a;
    --tooltip-fg: #ffffff;
    --mono: "JetBrains Mono", "Cascadia Code", "D2Coding", ui-monospace,
      "SFMono-Regular", Consolas, monospace;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0b1220;
      --panel: #101a2e;
      --panel-2: #0d1526;
      --border: #1e2a44;
      --text: #e6edf7;
      --muted: #8b98ad;
      --accent: #60a5fa;
      --accent-dim: rgba(96, 165, 250, 0.14);
      --good: #4ade80;
      --warn: #fbbf24;
      --warn-dim: rgba(251, 191, 36, 0.12);
      --bad: #f87171;
      --tooltip-bg: #e6edf7;
      --tooltip-fg: #0b1220;
    }
  }
  :root[data-theme="dark"] {
    --bg: #0b1220;
    --panel: #101a2e;
    --panel-2: #0d1526;
    --border: #1e2a44;
    --text: #e6edf7;
    --muted: #8b98ad;
    --accent: #60a5fa;
    --accent-dim: rgba(96, 165, 250, 0.14);
    --good: #4ade80;
    --warn: #fbbf24;
    --warn-dim: rgba(251, 191, 36, 0.12);
    --bad: #f87171;
    --tooltip-bg: #e6edf7;
    --tooltip-fg: #0b1220;
  }
  :root[data-theme="light"] {
    --bg: #ffffff;
    --panel: #ffffff;
    --panel-2: #f1f5f9;
    --border: #e2e8f0;
    --text: #0f172a;
    --muted: #64748b;
    --accent: #2563eb;
    --accent-dim: rgba(37, 99, 235, 0.1);
    --good: #16a34a;
    --warn: #b45309;
    --warn-dim: rgba(245, 158, 11, 0.1);
    --bad: #dc2626;
    --tooltip-bg: #0f172a;
    --tooltip-fg: #ffffff;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    -webkit-font-smoothing: antialiased;
  }
  .owrap { max-width: 880px; margin: 0 auto; padding: 30px 22px 80px; }

  .topbar {
    display: flex; align-items: baseline; justify-content: space-between;
    flex-wrap: wrap; gap: 8px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 12px; margin-bottom: 20px;
  }
  .brand { display: flex; align-items: center; gap: 10px; font-size: 16px; letter-spacing: 0.5px; }
  .brand .dot {
    width: 9px; height: 9px; border-radius: 50%;
    background: var(--good); box-shadow: 0 0 10px var(--good);
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }
  @media (prefers-reduced-motion: reduce) {
    .brand .dot, .rec-dot, .eva-face.talking { animation: none !important; }
  }
  .brand .sub { color: var(--muted); font-size: 12px; }
  .status { display: flex; align-items: center; gap: 10px; font-size: 12px; color: var(--muted); }

  .section-title {
    display: flex; align-items: center; gap: 8px;
    font-size: 12px; color: var(--muted);
    text-transform: uppercase; letter-spacing: 1.5px;
    margin: 34px 0 16px;
  }
  .section-title::before {
    content: ""; display: inline-block; width: 4px; height: 13px;
    background: var(--accent); opacity: 0.7;
  }
  .chart-panel {
    border: 1px solid var(--border); border-radius: 12px;
    background: var(--panel); padding: 16px 18px;
  }
  .foot {
    margin-top: 30px; border-top: 1px solid var(--border); padding-top: 12px;
    color: var(--muted); font-size: 11px; line-height: 1.7;
  }

  .stat-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 8px; }
  .stat-tile { border: 1px solid var(--border); border-radius: 10px; background: var(--panel); padding: 14px 16px; }
  .stat-label { font-size: 11px; color: var(--muted); margin-bottom: 6px; }
  .stat-num { font-size: 26px; font-variant-numeric: tabular-nums; }
  .stat-num small { font-size: 12px; color: var(--muted); margin-left: 3px; }
  .stat-num.grade { font-size: 15px; line-height: 1.4; padding-top: 5px; }

  .mode-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 14px; }
  .mode-card {
    display: flex; flex-direction: column; align-items: flex-start;
    text-align: left; border: 1px solid var(--border); border-radius: 12px;
    background: var(--panel); padding: 18px; cursor: pointer;
    font-family: var(--mono); color: var(--text);
    transition: border-color 0.15s, transform 0.1s;
  }
  .mode-card:hover { border-color: var(--accent); transform: translateY(-1px); }
  .mode-card:focus-visible, button:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .mode-card.static { cursor: default; }
  .mode-card.static:hover { transform: none; border-color: var(--border); }
  .mode-emoji { font-size: 26px; margin-bottom: 8px; }
  .mode-name { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
  .mode-desc { font-size: 12px; color: var(--muted); line-height: 1.6; }
  .combo-list { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; }
  .combo-chip {
    font-family: var(--mono); font-size: 11.5px; padding: 5px 10px;
    border: 1px solid var(--border); border-radius: 999px;
    background: var(--panel-2); color: var(--text); cursor: pointer;
  }
  .combo-chip:hover { border-color: var(--accent); color: var(--accent); }

  .warn-banner {
    border: 1px solid var(--warn); background: var(--warn-dim); color: var(--text);
    border-radius: 10px; padding: 12px 14px; font-size: 12.5px; line-height: 1.6; margin-bottom: 18px;
  }

  .exam-card { border: 1px solid var(--border); border-radius: 14px; background: var(--panel); padding: 26px 26px 22px; }
  .eva { display: flex; align-items: center; gap: 12px; margin-bottom: 18px; }
  .eva-face {
    width: 52px; height: 52px; border-radius: 50%;
    background: var(--panel-2); border: 2px solid var(--border);
    display: flex; align-items: center; justify-content: center; font-size: 24px;
  }
  .eva-face.talking { border-color: var(--accent); animation: talk 0.9s infinite; }
  @keyframes talk { 0%,100% { transform: scale(1); } 50% { transform: scale(1.06); } }
  .eva-name { font-size: 14px; font-weight: 600; }
  .eva-name small { color: var(--muted); font-weight: 400; font-size: 11px; }
  .q-meta { display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; }
  .q-cat { font-size: 11px; color: var(--accent); background: var(--accent-dim); padding: 2px 8px; border-radius: 5px; white-space: nowrap; }
  .q-type { font-size: 13px; color: var(--muted); }
  .q-controls { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; margin-bottom: 18px; }
  .live-toggle { font-size: 11.5px; color: var(--muted); display: flex; align-items: center; gap: 6px; cursor: pointer; }

  .rec-zone { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; padding: 14px 0 4px; }
  .btn {
    font-family: var(--mono); border-radius: 8px; cursor: pointer;
    border: 1px solid var(--border); font-size: 13px; padding: 10px 18px;
    background: var(--panel-2); color: var(--text);
  }
  .btn.rec { background: var(--bad); border-color: var(--bad); color: #fff; font-weight: 600; }
  .btn.stop { background: var(--accent); border-color: var(--accent); color: var(--bg); font-weight: 600; }
  .btn.ghost { background: transparent; color: var(--muted); }
  .btn.ghost:hover:not(:disabled) { color: var(--accent); border-color: var(--accent); }
  .btn.ghost:disabled { opacity: 0.45; cursor: default; }
  .btn.small { font-size: 11.5px; padding: 6px 10px; }
  .rec-status { font-size: 13px; display: flex; align-items: center; gap: 8px; }
  .rec-status small { color: var(--muted); }
  .rec-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--bad); animation: pulse 1.2s infinite; }

  .live-box {
    margin-top: 14px; border: 1px dashed var(--border); border-radius: 8px;
    background: var(--panel-2); padding: 12px 14px; font-size: 13px; line-height: 1.7; min-height: 52px;
  }
  .mic-err { color: var(--bad); font-size: 12.5px; margin: 8px 0; line-height: 1.6; }
  .q-text {
    font-size: 13.5px; line-height: 1.8; color: var(--text);
    background: var(--panel-2); border: 1px solid var(--border); border-radius: 8px;
    padding: 12px 14px; margin-bottom: 16px;
  }
  .manual-details { margin-top: 16px; }
  .manual-details summary {
    font-size: 12px; color: var(--muted); cursor: pointer;
    padding: 6px 0; user-select: none;
  }
  .manual-details summary:hover { color: var(--accent); }
  .manual-box { margin-top: 8px; font-size: 12px; color: var(--muted); line-height: 1.6; }
  .manual-box textarea {
    width: 100%; margin-top: 8px; font-family: var(--mono); font-size: 13px;
    border: 1px solid var(--border); border-radius: 8px; padding: 10px;
    color: var(--text); background: var(--panel-2); resize: vertical;
  }
  .manual-box .btn { margin-top: 8px; }
  .exam-tip { font-size: 11.5px; color: var(--muted); line-height: 1.7; margin-top: 14px; }
  .progress-pips { display: inline-flex; gap: 4px; align-items: center; }
  .pip { width: 8px; height: 8px; border-radius: 50%; background: var(--border); }
  .pip.done { background: var(--good); }
  .pip.now { background: var(--accent); }

  .result-hero { display: grid; grid-template-columns: auto 1fr; gap: 18px; align-items: stretch; margin-top: 6px; }
  @media (max-width: 560px) { .result-hero { grid-template-columns: 1fr; } }
  .hero-score { border: 1px solid var(--border); border-radius: 12px; background: var(--panel); padding: 18px 26px; text-align: center; }
  .hero-num { font-size: 46px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .hero-sub { font-size: 11px; color: var(--muted); }
  .hero-grade { border: 1px solid var(--border); border-left-width: 4px; border-radius: 12px; background: var(--panel); padding: 16px 20px; }
  .hero-grade.good { border-left-color: var(--good); }
  .hero-grade.warn { border-left-color: var(--warn); }
  .hero-grade.bad { border-left-color: var(--bad); }
  .hg-label { font-size: 11px; color: var(--muted); }
  .hg-grade { font-size: 20px; font-weight: 700; margin: 4px 0 6px; }
  .hg-desc { font-size: 12.5px; color: var(--muted); line-height: 1.6; }

  .bars { display: grid; gap: 10px; }
  .bar-row { display: grid; grid-template-columns: 92px 1fr 64px; align-items: center; gap: 10px; }
  .bar-label { font-size: 12px; color: var(--muted); }
  .bar-track { display: block; height: 14px; background: var(--panel-2); border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
  .bar-fill { display: block; height: 100%; background: var(--accent); border-radius: 4px 0 0 4px; }
  .bar-val { font-size: 12px; font-variant-numeric: tabular-nums; text-align: right; }
  .bar-val.good { color: var(--good); }
  .bar-val.warn { color: var(--warn); }
  .bar-val.bad { color: var(--bad); }

  .plan-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 14px; }
  .plan-card { border: 1px solid var(--border); border-left: 3px solid var(--accent); border-radius: 10px; background: var(--panel); padding: 14px 16px; }
  .plan-title { font-size: 13.5px; font-weight: 600; margin-bottom: 8px; }
  .plan-card ul { margin: 0; padding-left: 18px; }
  .plan-card li { font-size: 12px; color: var(--muted); line-height: 1.7; margin-bottom: 4px; }

  .ans-card { border: 1px solid var(--border); border-radius: 10px; background: var(--panel); margin-bottom: 10px; overflow: hidden; }
  .ans-card.skipped { opacity: 0.6; }
  .ans-head {
    width: 100%; text-align: left; display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    font-family: var(--mono); font-size: 13px; color: var(--text);
    background: none; border: none; padding: 12px 14px; cursor: pointer;
  }
  .ans-card.skipped .ans-head { cursor: default; }
  .ans-score { margin-left: auto; color: var(--accent); font-weight: 600; white-space: nowrap; }
  .ans-body { padding: 0 14px 14px; border-top: 1px solid var(--border); }
  .metric-chips { display: flex; flex-wrap: wrap; gap: 6px; margin: 12px 0; }
  .metric-chips span { font-size: 11px; border: 1px solid var(--border); background: var(--panel-2); border-radius: 999px; padding: 3px 9px; color: var(--muted); }
  .ans-audio { width: 100%; height: 36px; margin-bottom: 10px; }
  .transcript { font-size: 12.5px; line-height: 1.7; background: var(--panel-2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; margin-bottom: 10px; overflow-wrap: anywhere; }
  .used-good { font-size: 12px; color: var(--good); margin-bottom: 10px; }
  .fb-list { display: grid; gap: 8px; }
  .fb-item {
    font-size: 12.5px; line-height: 1.7; border: 1px solid var(--border); border-left-width: 3px;
    border-radius: 8px; padding: 9px 12px; display: flex; gap: 8px;
  }
  .fb-item.good { border-left-color: var(--good); }
  .fb-item.warn { border-left-color: var(--warn); }
  .fb-item.bad { border-left-color: var(--bad); }
  .fb-icon { flex-shrink: 0; font-weight: 700; }
  .fb-item.good .fb-icon { color: var(--good); }
  .fb-item.warn .fb-icon { color: var(--warn); }
  .fb-item.bad .fb-icon { color: var(--bad); }

  /* ── 첨삭 (수정 전/후) ─────────────── */
  .rev-zone { margin-top: 12px; display: flex; flex-wrap: wrap; align-items: center; gap: 8px; }
  .rev-hint { font-size: 11px; color: var(--muted); }
  .rev-out { width: 100%; }
  .rev-title { font-size: 11.5px; color: var(--muted); margin: 10px 0 6px; }
  .ai-badge {
    display: inline-block; margin: 10px 0 2px; font-size: 12px; font-weight: 600;
    color: var(--bg); background: var(--accent); border-radius: 6px; padding: 4px 10px;
  }
  .rev-diff {
    font-size: 13px; line-height: 2; color: var(--text);
    background: var(--panel-2); border: 1px solid var(--border); border-radius: 8px;
    padding: 12px 14px; overflow-wrap: anywhere;
  }
  .rev-diff del, .rev-issue del {
    color: var(--bad); background: color-mix(in srgb, var(--bad) 12%, transparent);
    text-decoration: line-through; border-radius: 3px; padding: 0 3px;
  }
  .rev-diff ins, .rev-issue ins {
    color: var(--good); background: color-mix(in srgb, var(--good) 14%, transparent);
    text-decoration: none; font-weight: 600; border-radius: 3px; padding: 0 3px;
  }
  .rev-clean {
    margin-top: 10px; font-size: 13px; line-height: 1.9; color: var(--text);
    border: 1px solid var(--good); border-radius: 8px; padding: 12px 14px;
    background: color-mix(in srgb, var(--good) 6%, transparent);
  }
  .rev-issues { margin-top: 10px; font-size: 12px; color: var(--text); display: grid; gap: 6px; }
  .rev-issue { line-height: 1.7; }
  .rev-issue small { color: var(--muted); }
  .rev-kind {
    font-size: 10.5px; color: var(--accent); background: var(--accent-dim);
    border-radius: 4px; padding: 1px 6px; margin-right: 4px;
  }
  .rev-logic { margin-top: 10px; font-size: 12px; color: var(--text); }
  .rev-logic ul { margin: 6px 0 0; padding-left: 18px; }
  .rev-logic li { line-height: 1.7; margin-bottom: 4px; color: var(--muted); }

  /* ── AI 첨삭 설정 ─────────────────── */
  .ai-setup { margin-top: 26px; border: 1px solid var(--border); border-radius: 10px; padding: 12px 16px; background: var(--panel); }
  .ai-setup summary { font-size: 13px; cursor: pointer; user-select: none; }
  .ai-setup summary:hover { color: var(--accent); }
  .ai-body { margin-top: 10px; font-size: 12px; color: var(--muted); line-height: 1.7; }
  .ai-body a { color: var(--accent); }
  .ai-row { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; margin-top: 8px; }
  .ai-row input {
    flex: 1; min-width: 200px; font-family: var(--mono); font-size: 12px;
    border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px;
    background: var(--panel-2); color: var(--text);
  }
  .ai-msg { font-size: 11.5px; color: var(--good); }
  .ai-diag { margin-top: 8px; font-size: 11px; color: var(--muted); line-height: 1.7; overflow-wrap: anywhere; }

  .trend-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .trend-title { font-size: 13px; }
  .trend-title small { color: var(--muted); font-size: 11px; }
  .tbl-btn {
    font-family: var(--mono); font-size: 11px; border: 1px solid var(--border);
    background: var(--panel-2); color: var(--muted); border-radius: 6px; padding: 4px 9px; cursor: pointer;
  }
  .tbl-btn:hover { color: var(--accent); border-color: var(--accent); }
  .trend-svg { width: 100%; height: auto; display: block; }
  .trend-table-wrap { overflow-x: auto; }
  .trend-table { border-collapse: collapse; font-size: 12px; width: 100%; }
  .trend-table th, .trend-table td { border: 1px solid var(--border); padding: 6px 10px; text-align: left; }
  .trend-table th { background: var(--panel-2); color: var(--muted); font-weight: 400; }
  .chart-empty { font-size: 12.5px; color: var(--muted); margin: 0; }
  .weak-note {
    margin: 12px 0 0; font-size: 12px; background: var(--warn-dim);
    border: 1px solid var(--warn); border-radius: 8px; padding: 9px 12px; line-height: 1.6;
  }
</style>
</head>
<body>


<div class="owrap" id="app"></div>

<script>
"use strict";
/* ══════════════ 문제은행 ══════════════ */
const SELF_INTRO = { id:"intro-1", cat:"자기소개", type:"description", tense:"present",
  text:"Let's start the interview now. Tell me something about yourself.",
  ko:"인터뷰를 시작하겠습니다. 자기소개를 해 주세요." };

const SURVEY_COMBOS = [
  { topic:"영화 보기", questions:[
    { id:"movie-1", type:"description", tense:"present", text:"You indicated in the survey that you like to watch movies. What kind of movies do you like to watch? Who is your favorite actor or actress? Tell me about them in detail.", ko:"어떤 영화를 좋아하나요? 좋아하는 배우는 누구인가요?" },
    { id:"movie-2", type:"habit", tense:"present", text:"How often do you go to the movies? Who do you usually go with, and what do you usually do before or after watching a movie? Tell me about a typical day when you go to see a movie.", ko:"영화를 얼마나 자주, 누구와 보러 가나요? 영화 보는 날의 루틴은?" },
    { id:"movie-3", type:"experience", tense:"past", text:"Tell me about the most memorable movie you have ever seen. What was it about? Who did you see it with? Why was it so memorable? Please tell me everything about that experience.", ko:"가장 기억에 남는 영화 관람 경험을 이야기해 주세요." } ] },
  { topic:"공원 가기", questions:[
    { id:"park-1", type:"description", tense:"present", text:"You indicated that you like to go to parks. Describe your favorite park. Where is it located and what does it look like? Tell me about it in as much detail as possible.", ko:"자주 가는 공원을 자세히 묘사해 주세요." },
    { id:"park-2", type:"habit", tense:"present", text:"What do you usually do when you go to the park? Who do you go with, and how often do you go there? Tell me about your typical visit to the park.", ko:"공원에서 주로 무엇을 하나요? 얼마나 자주 가나요?" },
    { id:"park-3", type:"experience", tense:"past", text:"Tell me about a memorable experience you had at a park. What happened? Who were you with? Why was it memorable? Please describe that experience in detail.", ko:"공원에서 있었던 기억에 남는 경험을 이야기해 주세요." } ] },
  { topic:"음악 감상", questions:[

function pick(arr, n) {
  const copy = [...arr], out = [];
  while (out.length < n && copy.length) out.push(copy.splice(Math.floor(Math.random() * copy.length), 1)[0]);
  return out;
}

  for (const combo of [...pick(SURVEY_COMBOS, 2), ...pick(SUDDEN_COMBOS, 1), ...pick(ROLEPLAY_COMBOS, 1)])
    for (const q of combo.questions) qs.push({ ...q, cat: combo.topic });
  for (const q of pick(ADVANCED_QUESTIONS, 1)) qs.push({ ...q });
  return qs;
}

/* ══════════════ 발화 분석기 (규칙 기반, 무료) ══════════════ */
const FILLERS_HARD = ["um","uh","er","ah","hmm","mm","erm"];
const FILLERS_SOFT = ["you know","i mean","kind of","sort of"];
const CONNECTIVES = ["first of all","to begin with","in addition","additionally","moreover","on top of that","however","on the other hand","in contrast","whereas","therefore","as a result","consequently","for example","for instance","in fact","actually","to be honest","frankly speaking","in my opinion","personally","the thing is","what i mean is","as far as i know","compared to","in the end","eventually","meanwhile","overall","to sum up","most importantly","surprisingly","unfortunately","fortunately","interestingly","at that time","back then","these days","looking back","long story short"];
const SUBORDINATORS = ["because","since","although","though","even though","while","when","whenever","if","unless","until","so that","in order to","which","who","whose","where","that","before","after","as soon as"];
const IRREGULAR_PAST = new Set(["went","saw","had","did","was","were","got","took","made","came","thought","felt","bought","ate","met","ran","said","told","gave","found","left","kept","knew","became","began","brought","spent","lost","paid","heard","held","stood","sat","wrote","drove","rode","flew","swam","sang","drank","slept","spoke","taught","caught","fought","chose","wore","won","built","sent","grew","fell","broke","forgot","understood","woke","threw","led","meant","sold"]);
const STOPWORDS = new Set(["the","a","an","and","or","but","so","to","of","in","on","at","for","with","is","are","was","were","be","been","am","i","you","he","she","it","we","they","my","your","his","her","its","our","their","me","him","them","us","this","that","these","those","do","does","did","have","has","had","will","would","can","could","not","no","yes","there","here","very","really","just","about","as","if","when","then","than","because","like","get","go"]);

function tokenize(t) { return (t.toLowerCase().match(/[a-z']+/g) || []); }
function countPhrases(lower, phrases) {
  const found = [];
  for (const p of phrases) {
    const m = lower.match(new RegExp("\\b" + p.replace(/ /g, "\\s+") + "\\b", "g"));
    if (m) found.push({ phrase: p, count: m.length });
  }
  return found;
}
function clamp(n) { return Math.max(0, Math.min(100, Math.round(n))); }

function analyzeAnswer({ transcript, durationSec, question }) {
  const lower = " " + transcript.toLowerCase().replace(/[^a-z' ]+/g, " ") + " ";
  const words = tokenize(transcript);
  const wordCount = words.length;
  const dur = Math.max(durationSec, 1);
  const wpm = Math.round((wordCount / dur) * 60);
  const punct = transcript.split(/[.!?]+/).filter(s => s.trim().length > 2);
  const estSentences = Math.max(punct.length, Math.round(wordCount / 14));

  const hardFillers = words.filter(w => FILLERS_HARD.includes(w)).length;
  const softFillers = countPhrases(lower, FILLERS_SOFT).reduce((a, b) => a + b.count, 0);
  const excessLike = Math.max(0, words.filter(w => w === "like").length - Math.ceil(wordCount / 60));
  const fillerTotal = hardFillers + softFillers + excessLike;
  const fillerRate = wordCount ? fillerTotal / wordCount : 0;

  const ttr = wordCount ? new Set(words).size / wordCount : 0;
  const longWords = words.filter(w => w.length >= 8 && !STOPWORDS.has(w));
  const freq = {};
  for (const w of words.filter(w => !STOPWORDS.has(w) && w.length > 2)) freq[w] = (freq[w] || 0) + 1;
  const repeated = Object.entries(freq).filter(([, c]) => c >= 4).sort((a, b) => b[1] - a[1]).slice(0, 5);

  const connectivesFound = countPhrases(lower, CONNECTIVES);
  const distinctConnectives = connectivesFound.length;
  const subCount = countPhrases(lower, SUBORDINATORS).reduce((a, b) => a + b.count, 0);
  const complexityRatio = estSentences ? subCount / estSentences : 0;
  const pastTokens = words.filter(w => IRREGULAR_PAST.has(w) || (w.length > 3 && w.endsWith("ed"))).length;
  const pastRatio = estSentences ? pastTokens / estSentences : 0;
  const questionMarkers = (lower.match(/\b(what|when|where|who|why|how|which|is there|are there|do you|does it|can i|can you|could you|would you|is it)\b/g) || []).length;

  const s = {};
  s.volume = clamp(Math.min(dur / 90, 1) * 50 + Math.min(wordCount / 120, 1) * 50);
  if (wpm >= 90 && wpm <= 150) s.pace = 100;
  else if (wpm < 90) s.pace = clamp((wpm / 90) * 100);
  else s.pace = clamp(100 - (wpm - 150) * 1.5);
  const ttrScore = clamp(((ttr - 0.35) / 0.3) * 100);
  const longScore = clamp((longWords.length / Math.max(wordCount * 0.06, 1)) * 100);
  s.vocab = clamp(ttrScore * 0.6 + longScore * 0.4);
  s.complexity = clamp((complexityRatio / 0.6) * 100);
  s.discourse = clamp((distinctConnectives / 5) * 100);
  s.fluency = clamp(100 - fillerRate * 800 - repeated.length * 6);
  if (question.type === "experience" || question.tense === "past") s.task = clamp((pastRatio / 0.8) * 100);
  else if (question.type === "roleplay-ask") s.task = clamp((questionMarkers / 4) * 100);
  else if (question.type === "issue" || question.type === "comparison") {
    const hits = countPhrases(lower, ["on the other hand","however","whereas","in contrast","compared to","advantage","disadvantage","in my opinion","i believe","i think","prefer","while"]);
    s.task = clamp((hits.length / 4) * 100);
  } else s.task = 100;

  const overall = clamp(s.volume * 0.2 + s.pace * 0.1 + s.vocab * 0.15 + s.complexity * 0.15 + s.discourse * 0.15 + s.fluency * 0.1 + s.task * 0.15);
  return {
    metrics: { durationSec: Math.round(dur), wordCount, wpm, estSentences, fillerTotal, hardFillers,
      likeCount: excessLike, ttr: +ttr.toFixed(2), distinctConnectives,
      connectivesFound: connectivesFound.map(c => c.phrase).slice(0, 8), subCount,
      complexityRatio: +complexityRatio.toFixed(2), pastRatio: +pastRatio.toFixed(2),
      questionMarkers, repeated },
    scores: s, overall,
  };
}

const SCORE_LABELS = { volume:"답변 분량", pace:"말하기 속도", vocab:"어휘 다양성", complexity:"문장 복잡도", discourse:"담화 연결", fluency:"유창성(필러)", task:"과제 수행" };

function gradeEstimate(avg) {
  if (avg >= 78) return { grade:"AL 가능권", cls:"good", desc:"구조·분량·연결이 AL 답변 수준입니다. 일관성 유지가 관건." };
  if (avg >= 64) return { grade:"IM3 ~ AL 경계", cls:"warn", desc:"AL까지 한 끗 차이. 아래 약점 1~2개만 집중 보완하세요." };
  if (avg >= 48) return { grade:"IM2 ~ IM3 추정", cls:"warn", desc:"기본기는 갖췄습니다. 답변 분량과 복문 사용을 늘리세요." };
  if (avg >= 32) return { grade:"IM1 ~ IM2 추정", cls:"bad", desc:"문장을 길게 이어가는 연습이 우선입니다." };
  return { grade:"IL ~ IM1 추정", cls:"bad", desc:"짧아도 좋으니 매일 완결된 답변을 끝까지 말하는 훈련부터." };
}

function buildFeedback(result, question) {
  const m = result.metrics, s = result.scores, fb = [];
  if (s.volume < 60) fb.push({ lv: s.volume < 35 ? "bad" : "warn",
    text: `답변이 ${m.durationSec}초/${m.wordCount}단어로 짧습니다. AL 평가자는 "충분히 길게, 끊기지 않는" 답변을 기대합니다 — 문항당 최소 90초·120단어를 목표로, [의견 → 이유 → 구체적 예시 → 마무리] 4단 구조로 늘리세요.` });
  if (s.pace < 60) fb.push({ lv:"warn", text: m.wpm < 90
    ? `말하기 속도가 ${m.wpm}WPM으로 느립니다. 답을 생각하며 말하는 시간이 길다는 뜻 — 자주 나오는 질문 유형별 "만능 도입부"를 외워 첫 10초를 자동화하세요.`
    : `속도가 ${m.wpm}WPM으로 다소 빠릅니다. 빠른 속도는 필러와 발음 뭉개짐을 유발합니다. 문장 사이에 의도적으로 짧은 휴지를 두세요.` });
  if (s.vocab < 60) fb.push({ lv:"warn",
    text: `어휘 다양성이 낮습니다(TTR ${m.ttr}). 같은 단어를 반복하고 있어요${m.repeated.length ? ` — 특히 "${m.repeated.map(r => r[0]).join('", "')}"` : ""}. 자주 쓰는 단어의 동의어를 2개씩 준비하세요 (good → amazing/impressive, fun → entertaining/enjoyable).` });
  if (s.complexity < 60) fb.push({ lv: s.complexity < 35 ? "bad" : "warn",
    text: `단문 위주입니다(문장당 종속절 ${m.complexityRatio}개). AL의 핵심 판별 기준은 복문입니다 — because/although/which/when으로 두 문장을 하나로 묶는 연습을 하세요. 예: "I love this park because it has a lake, which makes it perfect for evening walks."` });
  if (s.discourse < 60) fb.push({ lv:"warn",
    text: `담화 연결 표현이 ${m.distinctConnectives}종류뿐입니다. AL 답변은 First of all / On top of that / However / As a result 같은 연결어로 이야기의 뼈대를 세웁니다. 연결어 5개를 정해 모든 답변에 강제로 넣어보세요.` });
  if (s.fluency < 60) fb.push({ lv:"warn",
    text: `필러가 ${m.fillerTotal}회 감지됐습니다 (um/uh ${m.hardFillers}회${m.likeCount ? `, 과도한 like ${m.likeCount}회` : ""}). um 대신 "Well," "Let me think," "That's an interesting question" 같은 의미 있는 시간벌기 표현으로 교체하세요.` });
  if (s.task < 60) {
    if (question.type === "experience" || question.tense === "past") fb.push({ lv:"bad",
      text: `과거 경험 질문인데 과거시제 동사가 부족합니다(문장당 ${m.pastRatio}개). 시제 불일치는 IM 등급의 가장 흔한 원인입니다. went/saw/felt 등 과거형으로 스토리를 끌고 가세요.` });
    else if (question.type === "roleplay-ask") fb.push({ lv:"bad",
      text: `질문 표현이 ${m.questionMarkers}개만 감지됐습니다. 롤플레이 '질문하기'는 최소 3~4개의 직접 의문문이 필수입니다. "What time does it start?" "How much is it?" "Can I reserve seats?" 패턴을 준비하세요.` });
    else fb.push({ lv:"warn",
      text: `비교/의견 표현이 부족합니다. 고난도 문항은 "On the one hand … On the other hand …", "I strongly believe … because …" 프레임으로 답하세요.` });
  }
  if (!fb.length) fb.push({ lv:"good", text:"이 답변은 모든 지표에서 AL 기준을 충족합니다. 이 수준을 다른 주제에서도 재현하는 것이 목표입니다." });
  return fb;
}

function buildStudyPlan(avgScores) {

    .filter(([, v]) => v < 75).map(([k]) => STUDY_PLANS[k]).filter(Boolean);
}

/* ══════════════ AL 첨삭기 (규칙 기반, 무료) ══════════════
   전사를 AL 수준 답변으로 고쳐 쓰고, 무엇을 왜 고쳤는지 기록한다 */

// 한국인 학습자 단골 문법 오류 교정 규칙
const PAST_TO_BASE = { went:"go", saw:"see", ate:"eat", had:"have", got:"get", took:"take", made:"make", came:"come", bought:"buy", felt:"feel", met:"meet", thought:"think", did:"do", gave:"give", found:"find", told:"tell", said:"say", knew:"know", spent:"spend", lost:"lose" };
const ING_MAP = { watch:"watching", play:"playing", go:"going", read:"reading", listen:"listening", travel:"traveling", cook:"cooking", swim:"swimming", shop:"shopping", run:"running" };
const PLURAL_MAP = { friend:"friends", hobby:"hobbies", reason:"reasons", place:"places", memory:"memories", movie:"movies", thing:"things", time:"times", country:"countries", city:"cities" };
const PRESENT_TO_PAST = { go:"went", goes:"went", is:"was", are:"were", am:"was", see:"saw", sees:"saw", eat:"ate", eats:"ate", come:"came", comes:"came", take:"took", takes:"took", get:"got", gets:"got", have:"had", has:"had", make:"made", makes:"made", do:"did", does:"did", feel:"felt", feels:"felt", meet:"met", meets:"met", buy:"bought", buys:"bought", think:"thought", thinks:"thought", watch:"watched", watches:"watched", visit:"visited", visits:"visited", enjoy:"enjoyed", enjoys:"enjoyed", play:"played", plays:"played", stay:"stayed", stays:"stayed", walk:"walked", walks:"walked", talk:"talked", talks:"talked", want:"wanted", wants:"wanted", decide:"decided", decides:"decided", arrive:"arrived", arrives:"arrived", love:"loved", loves:"loved", spend:"spent", spends:"spent", drink:"drank", drinks:"drank" };
const HABIT_MARKERS = /\b(usually|always|often|sometimes|every|nowadays|these days|still)\s+(\w+\s+)?$/i;

const GRAMMAR_RULES = [
  { re: /\bi am agree\b/gi, to: () => "I agree", note: "agree는 동사라서 be동사(am)와 함께 쓰지 않아요" },
  { re: /\b(he|she|it) don't\b/gi, to: m => m.replace(/don't/i, "doesn't"), note: "3인칭 단수 주어에는 doesn't" },
  { re: /\bdidn't (went|saw|ate|had|got|took|made|came|bought|felt|met|thought|did|gave|found|told|said|knew|spent|lost)\b/gi, to: m => "didn't " + PAST_TO_BASE[m.split(/\s+/)[1].toLowerCase()], note: "didn't 뒤에는 동사원형" },
  { re: /\bvery (like|love|enjoy|want|recommend)\b/gi, to: m => m.replace(/very/i, "really"), note: "동사는 very가 아니라 really로 강조" },
  { re: /\bgo(es|ing)? to (shopping|swimming|hiking|fishing|camping|jogging)\b/gi, to: m => m.replace(/ to /i, " "), note: "go shopping/swimming처럼 to 없이 씁니다" },
  { re: /\balmost (people|everyone|students|koreans|customers)\b/gi, to: m => m.replace(/almost/i, "most"), note: "'대부분의 사람'은 almost가 아니라 most people" },
  { re: /\ba (hour|honest|umbrella|apple|orange|interesting|amazing|old|awesome|exciting|important)\b/gi, to: m => m.replace(/^a /i, "an "), note: "모음 발음 앞에는 an" },
  { re: /\bone of (my|the|his|her|our) (friend|hobby|reason|place|memory|movie|thing|time|country|city)\b/gi, to: m => { const w = m.split(/\s+/); return `one of ${w[2]} ${PLURAL_MAP[w[3].toLowerCase()]}`; }, note: "one of 뒤에는 복수 명사" },
  { re: /\bmany (time|thing|place|reason|movie|friend)\b/gi, to: m => { const w = m.split(/\s+/); return `many ${PLURAL_MAP[w[1].toLowerCase()]}`; }, note: "many 뒤에는 복수 명사" },
  { re: /\b(go|goes|went|practice|practices|practiced|study|studies|studied|exercise|exercises|exercised) everyday\b/gi, to: m => m.replace(/everyday/i, "every day"), note: "부사로 쓸 때는 every day (everyday는 형용사)" },
  { re: /\b(in|on|at) (last|next) (year|week|month|weekend)\b/gi, to: m => m.split(/\s+/).slice(1).join(" "), note: "last/next 앞에는 전치사를 쓰지 않아요" },
  { re: /\bdiscuss(ed|ing)? about\b/gi, to: m => m.replace(/ about/i, ""), note: "discuss는 전치사 없이 바로 목적어" },
  { re: /\bmarried with\b/gi, to: () => "married to", note: "married to가 맞는 표현" },
  { re: /\blisten(ed|ing|s)? (music|radio|songs|kpop)\b/gi, to: m => { const w = m.split(/\s+/); return `${w[0]} to ${w[1]}`; }, note: "listen to + 명사" },
  { re: /\benjoy(ed|s)? to (watch|play|go|read|listen|travel|cook|swim|shop|run)\b/gi, to: m => { const w = m.split(/\s+/); return `${w[0]} ${ING_MAP[w[2].toLowerCase()]}`; }, note: "enjoy 뒤에는 동명사(-ing)" },
  { re: /\bmore (better|easier|bigger|worse|happier|cheaper|faster|older|younger)\b/gi, to: m => m.split(/\s+/)[1], note: "비교급에는 more를 겹쳐 쓰지 않아요" },
  { re: /\bi and my (friend|family|sister|brother|wife|husband|girlfriend|boyfriend|coworker)\b/gi, to: m => "my " + m.split(/\s+/)[3] + " and I", note: "영어에서는 상대를 먼저: my friend and I" },
  { re: /\bfunny\b(?= (trip|time|day|experience|memory))/gi, to: () => "fun", note: "즐거운 경험은 fun (funny는 '웃긴')" },
  { re: /\b(like|love|liked|loved|likes|loves) (watch|play|read|listen|travel|cook|swim|shop|run)\b/gi, to: m => { const w = m.split(/\s+/); return `${w[0]} ${ING_MAP[w[1].toLowerCase()]}`; }, note: "like/love 뒤에는 동명사(-ing)" },
];

// very + 평범한 형용사 → 한 단계 높은 어휘
const VOCAB_UPGRADES = [
  [/\bvery good\b/gi, "fantastic"], [/\bvery nice\b/gi, "wonderful"],
  [/\bvery fun\b/gi, "really enjoyable"], [/\bvery big\b/gi, "huge"],
  [/\bvery small\b/gi, "tiny"], [/\bvery tired\b/gi, "exhausted"],
  [/\bvery happy\b/gi, "thrilled"], [/\bvery delicious\b/gi, "absolutely delicious"],
  [/\bvery beautiful\b/gi, "breathtaking"], [/\bvery interesting\b/gi, "fascinating"],
];

const OPENERS = {
  experience: "Oh, that reminds me of a really memorable experience.",
  description: "When it comes to this topic, the first thing that comes to mind is this.",
  habit: "Let me walk you through what I usually do.",
  comparison: "Looking back, a lot of things have changed over the years.",
  issue: "That's an interesting question, and I have a clear opinion about it.",
  "roleplay-ask": "Hi, thanks for taking my call — I have a few questions.",
  "roleplay-solve": "Hi, I'm really sorry but there's a problem I need to explain.",
};

function upgradeToAL(transcript, question) {
  let text = " " + transcript.replace(/\s+/g, " ").trim() + " ";
  const issues = [];

  // 1) 문법 교정
  for (const rule of GRAMMAR_RULES) {
    text = text.replace(rule.re, m => {
      const fixed = rule.to(m);
      if (fixed !== m) issues.push({ kind: "문법", from: m.trim(), to: fixed.trim(), note: rule.note });
      return fixed;
    });
  }

  // 2) 시제 교정: 과거 경험 답변인데 현재형 동사가 나오면 과거형으로
  if (question && (question.type === "experience" || question.tense === "past")) {
    const tokens = text.split(/(\s+)/);
    for (let i = 0; i < tokens.length; i++) {
      const w = tokens[i].toLowerCase();
      if (PRESENT_TO_PAST[w]) {
        const before = tokens.slice(Math.max(0, i - 6), i).join("");
        if (!HABIT_MARKERS.test(before + " ")) {
          issues.push({ kind: "시제", from: tokens[i], to: PRESENT_TO_PAST[w], note: "과거 경험은 과거시제로 말해야 감점이 없어요" });
          tokens[i] = PRESENT_TO_PAST[w];
        }
      }
    }
    text = tokens.join("");
  }

  // 3) 어휘 업그레이드
  for (const [re, to] of VOCAB_UPGRADES) {
    text = text.replace(re, m => {
      issues.push({ kind: "어휘", from: m.trim(), to, note: "한 단계 높은 어휘로 인상을 남기세요" });
      return to;
    });
  }

  // 4) 문장 분리 (전사에 마침표가 없을 때를 대비)
  let sents = text.trim().split(/(?<=[.!?])\s+/).filter(s => s.trim());
  if (sents.length <= 1 && text.trim().split(/\s+/).length > 25) {
    const words = text.trim().split(/\s+/);
    sents = [];
    let cur = [];
    for (let i = 0; i < words.length; i++) {
      cur.push(words[i]);
      const next = (words[i + 1] || "").toLowerCase();
      const after = (words[i + 2] || "").toLowerCase();
      // "my friend and I"처럼 주어 묶음 중간의 and에서는 문장을 끊지 않는다
      const isSubjectPair = next === "and" && ["i", "we", "my"].includes(after);
      if (cur.length >= 8 && !isSubjectPair &&
          ["and", "but", "so", "then", "because", "however", "also"].includes(next) &&
          words.length - i > 5) {
        sents.push(cur.join(" ")); cur = [];
      }
    }
    if (cur.length) sents.push(cur.join(" "));
  }
  sents = sents.map(s => s.trim().replace(/[.!?]+$/, ""));

  // 5) 구조 보강: 도입 → 연결어 → 마무리
  const lowerAll = text.toLowerCase();
  const hasOpener = /^(oh|well|when it comes|let me|that's|looking back|hi)\b/i.test(sents[0] || "");
  if (!hasOpener && OPENERS[question?.type]) {
    sents.unshift(OPENERS[question.type].replace(/\.$/, ""));
    issues.push({ kind: "구조", from: "(도입 없음)", to: OPENERS[question.type], note: "첫 문장에서 자연스럽게 말문을 여는 도입이 AL 답변의 시작이에요" });
  }
  const CONN_START = /^(first of all|on top of that|however|as a result|overall|in the end|for example|after that|then|also|besides|moreover|actually|unfortunately|fortunately|at first|suddenly|looking back)\b/i;
  if (sents.length >= 3 && !CONN_START.test(sents[1])) {
    sents[1] = "First of all, " + sents[1].charAt(0).toLowerCase() + sents[1].slice(1);
    issues.push({ kind: "구조", from: "(연결어 없음)", to: "First of all, …", note: "본론 첫 문장은 연결어로 시작해 이야기 뼈대를 세우세요" });
  }
  const midIdx = Math.floor(sents.length / 2);
  if (sents.length >= 5 && !CONN_START.test(sents[midIdx])) {
    sents[midIdx] = "On top of that, " + sents[midIdx].charAt(0).toLowerCase() + sents[midIdx].slice(1);
    issues.push({ kind: "구조", from: "(연결어 없음)", to: "On top of that, …", note: "중간에도 연결어를 넣어 문단 감각을 보여주세요" });
  }
  if (!/(overall|in the end|that's why|to sum up|long story short)/i.test(lowerAll) && sents.length >= 2) {
    sents.push("Overall, it was a truly meaningful experience that I still remember vividly");
    issues.push({ kind: "구조", from: "(마무리 없음)", to: "Overall, …", note: "감정·의미를 담은 마무리 문장이 답변을 '완결된 이야기'로 만들어요" });
  }

  // 6) 문장 정리: 첫 글자 대문자, 홀로 있는 i 대문자
  const corrected = sents
    .map(s => s.replace(/\bi\b/g, "I").replace(/^\s*([a-z])/, (m, c) => c.toUpperCase()))
    .join(". ") + ".";

  return { corrected, issues };
}

// 내용 논리 점검 (규칙 기반 한계 안에서)
function buildLogicNotes(transcript, question) {
  const notes = [];
  const lower = transcript.toLowerCase();
  const qWords = (question.text.toLowerCase().match(/[a-z]{4,}/g) || [])
    .filter(w => !STOPWORDS.has(w) && !["tell", "about", "please", "describe", "everything", "detail", "indicated", "survey", "usually"].includes(w));
  const overlap = [...new Set(qWords)].filter(w => lower.includes(w));
  if (overlap.length < 2 && transcript.split(/\s+/).length > 20)
    notes.push(`질문의 핵심 단어(${[...new Set(qWords)].slice(0, 4).join(", ")})가 답변에 거의 등장하지 않아요 — 동문서답으로 들릴 수 있으니 질문 키워드를 직접 언급하세요.`);
  if (!/(for example|for instance|once|one day|last (year|week|month|summer|winter)|when i was)/i.test(lower))
    notes.push("구체적인 예시나 일화가 없어요. AL 답변은 반드시 '실제 있었던 한 장면'을 담습니다 — 지어내도 괜찮아요.");
  if (!/(because|since|so that|that's why|the reason)/i.test(lower))
    notes.push("이유를 설명하는 표현(because, that's why)이 없어요 — 주장마다 이유 한 개씩을 붙이는 습관을 들이세요.");
  const segs = transcript.toLowerCase().split(/[.!?]+/).map(s => s.trim()).filter(s => s.length > 15);
  const dup = segs.filter((s, i) => segs.indexOf(s) !== i);
  if (dup.length) notes.push("같은 문장을 반복하고 있어요 — 반복 대신 부연(In other words, …)으로 바꾸면 어휘 점수도 올라갑니다.");
  return notes;
}

// 반복 블록 제거: 어떤 패턴으로든 같은 구절이 연달아 반복되면 한 번만 남긴다
// (기기별 음성인식 중복 버그에 대한 최종 방어선 — 3단어 이상 블록만 대상)
function dedupeRepeats(text) {
  const tokens = text.split(/\s+/).filter(Boolean);
  let changed = true;
  while (changed) {
    changed = false;
    outer:
    for (let L = Math.min(40, Math.floor(tokens.length / 2)); L >= 3; L--) {
      for (let i = 0; i + 2 * L <= tokens.length; i++) {
        let same = true;
        for (let k = 0; k < L; k++) {
          if (tokens[i + k].toLowerCase() !== tokens[i + L + k].toLowerCase()) { same = false; break; }
        }
        if (same) { tokens.splice(i + L, L); changed = true; break outer; }
      }
    }
  }
  return tokens.join(" ");
}

// 단어 단위 diff (LCS) → 수정 전/후 하이라이트 HTML
function diffWords(a, b) {
  const A = a.split(/\s+/).filter(Boolean), B = b.split(/\s+/).filter(Boolean);
  const norm = w => w.toLowerCase().replace(/[.,!?]+$/, "");
  const n = A.length, m = B.length;
  const dp = Array.from({ length: n + 1 }, () => new Uint16Array(m + 1));
  for (let i = n - 1; i >= 0; i--)
    for (let j = m - 1; j >= 0; j--)
      dp[i][j] = norm(A[i]) === norm(B[j]) ? dp[i + 1][j + 1] + 1 : Math.max(dp[i + 1][j], dp[i][j + 1]);
  const out = [];
  let i = 0, j = 0;
  while (i < n && j < m) {
    if (norm(A[i]) === norm(B[j])) { out.push(esc(B[j])); i++; j++; }
    else if (dp[i + 1][j] >= dp[i][j + 1]) { out.push(`<del>${esc(A[i])}</del>`); i++; }
    else { out.push(`<ins>${esc(B[j])}</ins>`); j++; }
  }
  while (i < n) { out.push(`<del>${esc(A[i])}</del>`); i++; }
  while (j < m) { out.push(`<ins>${esc(B[j])}</ins>`); j++; }
  return out.join(" ");
}

// 첨삭 결과 렌더링: diff → AL 버전 → 고친 이유 → 논리 점검
function revisionHTML(orig, corrected, issues, logicNotes, title) {
  return `
    <div class="rev-title">${esc(title)}</div>
    <div class="rev-diff">${diffWords(orig, corrected)}</div>
    <div class="rev-clean"><b>✅ AL 버전 — 소리 내어 3번 읽으며 연습하세요</b><br>${esc(corrected)}</div>
    ${issues.length ? `<div class="rev-issues"><b>고친 이유</b>${issues.slice(0, 14).map(it =>
      `<div class="rev-issue"><span class="rev-kind">${esc(it.kind || "수정")}</span> <del>${esc(it.from)}</del> → <ins>${esc(it.to)}</ins><small> · ${esc(it.note)}</small></div>`).join("")}</div>` : ""}
    ${logicNotes.length ? `<div class="rev-logic"><b>내용·논리 점검</b><ul>${logicNotes.map(n => `<li>${esc(n)}</li>`).join("")}</ul></div>` : ""}`;
}

/* ══════════════ AI 정밀 첨삭 (선택 — 본인 무료 API 키) ══════════════ */
function getAiKey() { try { return localStorage.getItem("opic_gemini_key") || ""; } catch { return ""; } }

// 모델 이름은 Google이 수시로 바꾸고, 일부는 "신규 사용자 차단" 상태라
// 목록 조회만으로는 알 수 없다 → 실제로 호출해서 되는 모델을 찾아 캐시한다.
const AI_MODEL_CANDIDATES = [
  "gemini-2.0-flash", "gemini-flash-latest", "gemini-2.5-flash-lite",
  "gemini-2.0-flash-001", "gemini-2.5-flash", "gemini-1.5-flash", "gemini-pro-latest",
];

function extractApiError(bodyText) {
  try { const j = JSON.parse(bodyText); return j?.error?.message || bodyText.slice(0, 200); }
  catch { return (bodyText || "").slice(0, 200); }
}

// 이 키로 generateContent가 가능한 모델 이름들을 목록에서 수집(후보 확장용)
async function listUsableModels(key) {
  try {
    const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${encodeURIComponent(key)}`);
    if (!r.ok) return [];
    const j = await r.json();
    return (j.models || [])
      .filter(m => (m.supportedGenerationMethods || []).includes("generateContent"))
      .map(m => m.name.replace(/^models\//, ""))
      .filter(m => /flash|pro/.test(m) && !/vision|thinking|image|tts|embedding|learnlm|exp/.test(m));
  } catch { return []; }
}

async function callGemini(model, key, prompt) {
  return fetch(
    `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${encodeURIComponent(key)}`,
    { method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        contents: [{ parts: [{ text: prompt }] }],
        generationConfig: { temperature: 0.4, responseMimeType: "application/json" },
      }) }
  );
}

async function aiReview(transcript, question) {
  const key = getAiKey();
  if (!key) throw new Error("API 키가 등록되지 않았어요. 홈 하단에서 키를 저장해 주세요.");
  const prompt = `You are a strict but encouraging OPIc examiner. Target level: AL (Advanced Low).
This is a Korean learner's spoken answer, transcribed by speech-to-text (punctuation and small words may be wrong).

QUESTION: ${question.text}
ANSWER (transcript): ${transcript}

Do a THOROUGH correction. You MUST:
- Fix every grammar error (articles, verb tense, subject-verb agreement, prepositions, plurals, word form).
- Fix awkward or unnatural phrasing so it sounds like a fluent speaker.
- Improve logic and flow, add a concrete example if the answer is vague, but KEEP the learner's own ideas.
- Do NOT just add connective words — actually rewrite sentences to a higher level.

Respond with ONLY a JSON object (no markdown, no code fence), exactly:
{
 "corrected": "the full answer rewritten at natural AL level, with proper punctuation",
 "grammar": [{"from":"exact wrong phrase from the transcript","to":"corrected phrase","why":"한국어로 왜 틀렸는지 한 문장"}],
 "logic": ["내용·논리·구성에 대한 지적과 개선책을 한국어로 (최대 3개)"],
 "tips": ["이 답변을 AL로 끌어올릴 핵심 조언을 한국어로 (최대 2개)"]
}
Include at least 3 grammar items if any errors exist. Base every "from" on text that actually appears in the transcript.`;

  // 후보 목록: (1) 지난번 성공 모델 (2) 하드코딩 후보 (3) 이 키의 목록에서 발견한 모델
  const cached = (() => { try { return localStorage.getItem("opic_gemini_model") || ""; } catch { return ""; } })();
  let candidates = [];
  if (cached) candidates.push(cached);
  candidates.push(...AI_MODEL_CANDIDATES);
  for (const m of await listUsableModels(key)) if (!candidates.includes(m)) candidates.push(m);
  candidates = [...new Set(candidates)];

  const attempts = [];   // 진단용: 모델별 결과
  let anyPerDay = false, anyPerMin = false, keyError = "";

  for (const model of candidates) {
    let res;
    try { res = await callGemini(model, key, prompt); }
    catch { attempts.push({ model, status: "net", msg: "네트워크 오류" }); continue; }

    if (res.ok) {
      try { localStorage.setItem("opic_gemini_model", model); } catch {}
      const data = await res.json();
      const cand = data?.candidates?.[0];
      if (cand?.finishReason === "SAFETY") throw new Error("안전 필터에 걸렸어요. 다른 답변으로 시도해 주세요.");
      let raw = (cand?.content?.parts || []).map(p => p.text || "").join("").trim();
      if (!raw) throw new Error("응답이 비어 있어요. 답변을 조금 더 길게 말한 뒤 다시 시도해 주세요.");
      raw = raw.replace(/^```(json)?/i, "").replace(/```\s*$/i, "").trim();
      const s = raw.indexOf("{"), e = raw.lastIndexOf("}");
      if (s >= 0 && e > s) raw = raw.slice(s, e + 1);
      let parsed;
      try { parsed = JSON.parse(raw); }
      catch { throw new Error("AI 응답 형식을 해석하지 못했어요. 다시 시도해 주세요."); }
      if (!parsed.corrected) throw new Error("교정 결과가 비어 있어요. 다시 시도해 주세요.");
      parsed.__model = model;
      return parsed;
    }

    const body = await res.text();
    const msg = extractApiError(body);
    attempts.push({ model, status: res.status, msg });
    // 키 오류는 모든 모델에 공통 → 즉시 중단
    if ((res.status === 400 || res.status === 403) && /api key|permission|invalid|denied/i.test(msg)) {
      keyError = msg; break;
    }
    if (res.status === 429) {
      if (/per day|perday|daily|requests per day|GenerateRequestsPerDay/i.test(body)) anyPerDay = true;
      else anyPerMin = true;
    }
    // 429·404 등은 다음 후보로 계속 (모델마다 할당량이 다르므로)
    try { localStorage.removeItem("opic_gemini_model"); } catch {}
  }

  // 모든 후보 실패 → 원인 종합
  if (keyError) throw makeAiError("API 키에 문제가 있어요 — " + keyError, attempts);
  if (anyPerMin && !anyPerDay)
    throw makeAiError("분당 무료 한도에 걸렸어요. 1~2분 기다렸다가 딱 한 번만 다시 눌러 주세요.", attempts);
  if (anyPerDay)
    throw makeAiError("이 키로 지금 쓸 수 있는 모델의 무료 하루 한도가 모두 소진됐어요. 보통 태평양시간 자정(한국 오후 4~5시)에 리셋됩니다. 급하면 다른 구글 계정으로 키를 하나 더 만들어 바꿔 넣으세요.", attempts);
  throw makeAiError("사용 가능한 모델을 찾지 못했어요.", attempts);
}

// 에러에 진단 정보를 붙인다 (연결 테스트에서 모델별 결과를 보여주기 위함)
function makeAiError(message, attempts) {
  const e = new Error(message);
  e.attempts = attempts || [];
  return e;
}

/* ══════════════ 저장소 (localStorage) ══════════════ */
const STORE_KEY = "opic_sessions_v1";
function loadSessions() { try { return JSON.parse(localStorage.getItem(STORE_KEY) || "[]"); } catch { return []; } }
function saveSessions(list) { try { localStorage.setItem(STORE_KEY, JSON.stringify(list.slice(-120))); } catch {} }
function calcStreak(sessions) {
  const days = new Set(sessions.map(s => s.day));
  let streak = 0;
  const d = new Date();
  if (!days.has(d.toDateString())) d.setDate(d.getDate() - 1);
  while (days.has(d.toDateString())) { streak++; d.setDate(d.getDate() - 1); }
  return streak;
}

/* ══════════════ 앱 상태 + 렌더 ══════════════ */
const APP_VER = "v11";
const app = document.getElementById("app");
const SR_CLASS = window.SpeechRecognition || window.webkitSpeechRecognition || null;
// 삼성 인터넷 등 일부 크로뮴 계열은 API가 존재해도 실제 인식이 동작하지 않는다
const IS_SAMSUNG = /SamsungBrowser/i.test(navigator.userAgent);
// 모바일에서는 마이크가 독점이라 녹음(MediaRecorder)과 음성인식을 동시에 못 쓴다
// → 모바일은 음성인식(전사) 우선, 답변 녹음/다시듣기는 데스크톱에서만
const IS_MOBILE = /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent);
const S = {
  screen: "home", questions: [], qIdx: 0, answers: [],
  recording: false, replaysLeft: 1,
  // 실시간 전사는 기본 켜짐 — 사용자가 끄면 그 선택을 기억한다
  showLive: (() => { try { return localStorage.getItem("opic_show_live") !== "off"; } catch { return true; } })(),
  micError: "", trendTable: false,
  srDead: false,      // 음성인식이 런타임에 실패한 것으로 감지됨
  showText: false,    // 질문 영어 텍스트 표시 (TTS가 안 들릴 때 자동 켜짐)
  emptyWarn: false,   // 답변 완료 시 전사가 비어 있었음
};
// baseSegs: 이전 인식 세션(자동 재시작 이전)까지 확정된 문장 조각들
// sessionSegs: 현재 인식 세션의 확정 조각 — 매 이벤트마다 전체를 다시 조립하고
//              조각 단위로 중복을 걸러, 안드로이드의 중복·에코 결과에 면역이 되게 한다
const R = { recog: null, media: null, chunks: [], baseSegs: [], sessionSegs: [], final: "",
  start: 0, timer: null, keepAlive: false, watchdog: null, pendingAudio: null, pendingDur: 0 };

function esc(t) { return String(t).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;"); }
function el(id) { return document.getElementById(id); }

/* ── TTS ── */
function speak(text) {
  // TTS가 없거나 3초 내 재생이 시작되지 않으면 질문 텍스트를 화면에 띄운다
  if (!("speechSynthesis" in window)) {
    if (!S.showText && S.screen === "exam") { S.showText = true; render(); }
    return;
  }
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = "en-US"; u.rate = 0.92;
  const vs = speechSynthesis.getVoices();
  const v = vs.find(v => v.lang === "en-US" && /female|samantha|aria|jenny/i.test(v.name))
    || vs.find(v => v.lang === "en-US") || vs.find(v => v.lang && v.lang.startsWith("en"));
  if (v) u.voice = v;
  let started = false;
  u.onstart = () => { started = true; const f = el("eva-face"); if (f) f.classList.add("talking"); };
  u.onend = () => { const f = el("eva-face"); if (f) f.classList.remove("talking"); };
  u.onerror = () => { if (!S.showText && S.screen === "exam") { S.showText = true; render(); } };
  speechSynthesis.speak(u);
  setTimeout(() => {
    if (!started && !S.showText && S.screen === "exam" && !S.recording) { S.showText = true; render(); }
  }, 3000);
}
if ("speechSynthesis" in window) { speechSynthesis.getVoices(); speechSynthesis.onvoiceschanged = () => {}; }

/* ── 녹음 + 음성인식 ──
   데스크톱: 녹음 + 음성인식 동시 (마이크 공유 가능)
   모바일: 마이크가 독점이라 동시에 켜면 둘 다 실패 → 음성인식(전사)만 사용 */

// 누적본 병합: 새 조각이 기존 조각을 포함하거나(더 긴 버전) 기존에 이미 포함되어
// 있으면(부분본) 둘 중 긴 쪽 하나만 남긴다 — 안드로이드가 같은 발화를
// "I like" → "I like watching" → "I like watching movies"처럼 겹쳐 보내는 패턴 대응
function mergeSegment(list, t) {
  const tn = t.toLowerCase();
  for (let i = list.length - 1; i >= 0; i--) {
    const ln = list[i].toLowerCase();
    if (ln === tn || ln.includes(tn)) return;          // 이미 있는 조각의 부분본 → 버림
    if (tn.includes(ln)) { list.splice(i, 1); }         // 기존 조각의 확장본 → 기존 것 제거
  }
  list.push(t);
}

// 인식 세션 하나를 새 인스턴스로 시작 — 같은 인스턴스를 재시작하면
// 일부 기기에서 이전 결과를 다시 재생(replay)해 전사가 반복되는 문제가 있다
function startRecognizer() {
  const r = new SR_CLASS();
  r.lang = "en-US"; r.continuous = true; r.interimResults = true;
  r.onresult = e => {
    clearTimeout(R.watchdog);
    // 이어붙이지 않고 이번 세션의 확정 조각 전체를 매번 처음부터 다시 조립:
    // (1) 누적본 병합 — "I like" → "I like watching"처럼 겹치는 조각은 긴 쪽만 유지
    // (2) 이전 세션 문장을 다시 보내는 에코 제거
    // (3) 임시(interim) 결과는 마지막 것 하나만 표시 (누적본을 이어붙이면 반복처럼 보임)
    const baseNorm = R.baseSegs.map(s => s.toLowerCase());
    const segs = [];
    let interim = "";
    for (let i = 0; i < e.results.length; i++) {
      const t = (e.results[i][0].transcript || "").trim();
      if (!t) continue;
      if (e.results[i].isFinal) {
        const tn = t.toLowerCase();
        if (t.split(/\s+/).length >= 3 && baseNorm.includes(tn)) continue; // 에코
        mergeSegment(segs, t);
      } else interim = t; // 마지막 임시 결과만
    }
    R.lastInterim = interim;
    R.sessionSegs = segs;
    R.final = dedupeRepeats([...R.baseSegs, ...segs].join(" "));
    const box = el("live-box");
    if (box) box.textContent = dedupeRepeats((R.final + " " + interim).trim()) || "말씀하시면 여기에 영어 전사가 표시됩니다…";
  };
  r.onend = () => {
    // 인식 세션이 끝나면(침묵 등) 확정 조각을 base로 병합하고 "새 인스턴스"로 재시작
    if (R.sessionSegs.length) {
      for (const s of R.sessionSegs) mergeSegment(R.baseSegs, s);
      R.sessionSegs = [];
    } else if (R.lastInterim && R.lastInterim.split(/\s+/).length >= 2) {
      // 확정 결과를 끝내 안 주는 기기: 마지막 임시 결과라도 살린다
      mergeSegment(R.baseSegs, R.lastInterim);
    }
    R.lastInterim = "";
    R.final = dedupeRepeats(R.baseSegs.join(" "));
    if (R.keepAlive) { try { startRecognizer(); } catch {} }
  };
  // 삼성 인터넷 등: API는 있지만 인식 서비스가 없어 즉시 에러가 난다 → 감지 후 텍스트 입력 안내
  r.onerror = e => {
    if (["service-not-allowed", "not-allowed", "language-not-supported", "audio-capture", "network"].includes(e.error)) {
      R.keepAlive = false;
      S.srDead = true;
      if (S.recording) render();
    }
  };
  try { r.start(); } catch { S.srDead = true; }
  R.recog = r;
}
async function startRecording() {
  S.micError = ""; S.emptyWarn = false;
  R.final = ""; R.baseSegs = []; R.sessionSegs = []; R.lastInterim = ""; R.chunks = []; R.media = null;
  if ("speechSynthesis" in window) speechSynthesis.cancel();

  const useRecorder = !(IS_MOBILE && SR_CLASS && !S.srDead);
  if (useRecorder) {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      const mr = new MediaRecorder(stream);
      mr.ondataavailable = e => { if (e.data.size) R.chunks.push(e.data); };
      mr.start();
      R.media = mr;
    } catch {
      if (!SR_CLASS || S.srDead) {
        S.micError = "마이크를 사용할 수 없습니다. 브라우저 설정에서 이 사이트의 마이크 권한을 허용해 주세요. 지금은 아래에 답변을 텍스트로 입력해도 동일하게 분석됩니다.";
        render();
        return;
      }
      // 인식은 가능할 수 있으니 녹음 없이 계속 진행
    }
  }

  if (SR_CLASS && !S.srDead) {
    R.keepAlive = true;
    startRecognizer();
    // 12초 동안 인식 결과가 전혀 없으면 미지원 브라우저로 간주하고 대안 안내
    clearTimeout(R.watchdog);
    R.watchdog = setTimeout(() => {
      if (S.recording && !R.final && SR_CLASS && !S.srDead) { S.srDead = true; render(); }
    }, 12000);
  }

  R.start = Date.now();
  R.timer = setInterval(() => {
    const sec = Math.round((Date.now() - R.start) / 1000);
    const t = el("elapsed");
    if (t) t.innerHTML = `<b>${sec}초</b><small>${sec < 60 ? " (AL 목표: 90초 이상)" : sec < 90 ? " (조금만 더!)" : " ✓ 충분한 분량"}</small>`;
  }, 500);
  S.recording = true;
  render();
}

function stopRecording() {
  return new Promise(resolve => {
    R.keepAlive = false;
    clearTimeout(R.watchdog);
    try { if (R.recog) R.recog.stop(); } catch {}
    clearInterval(R.timer);
    const dur = Math.round((Date.now() - R.start) / 1000);
    const mr = R.media;
    if (mr && mr.state !== "inactive") {
      mr.onstop = () => {
        mr.stream.getTracks().forEach(t => t.stop());
        resolve({ dur, audioUrl: URL.createObjectURL(new Blob(R.chunks, { type: "audio/webm" })) });
      };
      mr.stop();
    } else resolve({ dur, audioUrl: null });
    S.recording = false;
  });
}

/* ── 시험 흐름 ── */
function startExam(qs) {
  if ("speechSynthesis" in window) speechSynthesis.getVoices();
  S.questions = qs; S.qIdx = 0; S.answers = []; S.screen = "exam";
  enterQuestion();
}
function enterQuestion() {
  S.replaysLeft = 1; S.micError = ""; S.emptyWarn = false;
  R.final = ""; R.pendingAudio = null; R.pendingDur = 0;
  render();
  setTimeout(() => speak(S.questions[S.qIdx].text), 400);
}
// 지금까지 인식된 전체 텍스트를 조각 병합 + 반복 제거를 거쳐 계산
// (onend가 아직 안 온 마지막 세션의 조각과 임시 결과까지 포함)
function currentTranscript() {
  const segs = [...R.baseSegs];
  for (const s of R.sessionSegs) mergeSegment(segs, s);
  if (R.lastInterim && R.lastInterim.split(/\s+/).length >= 2) mergeSegment(segs, R.lastInterim);
  return { text: dedupeRepeats(segs.join(" ")).trim(), segs };
}

async function submitAnswer() {
  const cur = currentTranscript();
  const { dur, audioUrl } = await stopRecording();
  const q = S.questions[S.qIdx];
  const manual = el("manual-text");
  const typed = (manual ? manual.value : "").trim();
  const transcript = cur.text || typed;
  if (!transcript) {
    // 전사가 비었으면 그냥 넘기지 않고, 녹음은 보존한 채 직접 입력 기회를 준다
    R.pendingAudio = audioUrl; R.pendingDur = dur;
    S.emptyWarn = true;
    render();
    return;
  }
  advance({ q, transcript, dur, audioUrl, rawSegs: cur.segs,
    result: analyzeAnswer({ transcript, durationSec: dur, question: q }) });
}
function submitManualOnly() {
  const q = S.questions[S.qIdx];
  const transcript = (el("manual-text") ? el("manual-text").value : "").trim();
  if (!transcript) return;
  const words = transcript.split(/\s+/).filter(Boolean).length;
  // 직전에 녹음한 실제 발화 시간이 있으면 그것을 사용, 없으면 120WPM 기준 추정
  const dur = R.pendingDur > 3 ? R.pendingDur : Math.max(Math.round(words / 2), 10);
  const audioUrl = R.pendingAudio;
  R.pendingAudio = null; R.pendingDur = 0;
  advance({ q, transcript, dur, audioUrl, result: analyzeAnswer({ transcript, durationSec: dur, question: q }) });
}
function skipQuestion() {
  if (S.recording) stopRecording();
  advance({ q: S.questions[S.qIdx], transcript: "", dur: 0, audioUrl: null, result: null });
}
function advance(entry) {
  S.answers.push(entry);
  if (S.qIdx + 1 < S.questions.length) { S.qIdx++; enterQuestion(); }
  else finishSession();
}
function finishSession() {
  if ("speechSynthesis" in window) speechSynthesis.cancel();
  const answered = S.answers.filter(a => a.result);
  if (answered.length) {
    const sub = {};
    for (const k of Object.keys(SCORE_LABELS))
      sub[k] = Math.round(answered.reduce((s, a) => s + a.result.scores[k], 0) / answered.length);
    const overall = Math.round(answered.reduce((s, a) => s + a.result.overall, 0) / answered.length);
    const now = new Date();
    const list = loadSessions();
    list.push({ date: `${now.getMonth() + 1}/${now.getDate()}`, day: now.toDateString(), overall, sub, n: answered.length });
    saveSessions(list);
  }
  S.screen = "result";
  render();
}
function quitExam() {
  R.keepAlive = false;
  clearTimeout(R.watchdog);
  try { if (R.recog) R.recog.stop(); } catch {}
  if (R.media && R.media.state === "recording") { R.media.stream.getTracks().forEach(t => t.stop()); R.media.stop(); }
  clearInterval(R.timer);
  S.recording = false;
  if ("speechSynthesis" in window) speechSynthesis.cancel();
  S.screen = "home";
  render();
}

/* ── 추이 차트 (인라인 SVG) ── */
function trendChartHTML(sessions) {
  if (sessions.length < 2)
    return '<p class="chart-empty">연습 세션이 2회 이상 쌓이면 점수 추이 그래프가 표시됩니다.</p>';
  if (S.trendTable) {
    return `<div class="trend-table-wrap"><table class="trend-table"><thead><tr><th>날짜</th><th>점수</th></tr></thead><tbody>${
      sessions.map(s => `<tr><td>${esc(s.date)}</td><td>${s.overall}</td></tr>`).join("")
    }</tbody></table></div>`;
  }
  const W = 640, H = 180, P = { l: 34, r: 46, t: 14, b: 24 };
  const iw = W - P.l - P.r, ih = H - P.t - P.b;
  const x = i => P.l + (i / (sessions.length - 1)) * iw;
  const y = v => P.t + (1 - v / 100) * ih;
  const path = sessions.map((s, i) => `${i ? "L" : "M"}${x(i).toFixed(1)},${y(s.overall).toFixed(1)}`).join(" ");
  const last = sessions[sessions.length - 1], li = sessions.length - 1;
  const grid = [0, 25, 50, 75, 100].map(v =>
    `<line x1="${P.l}" x2="${W - P.r}" y1="${y(v)}" y2="${y(v)}" stroke="var(--border)" stroke-width="1"/>
     <text x="${P.l - 6}" y="${y(v) + 3.5}" text-anchor="end" font-size="10" fill="var(--muted)">${v}</text>`).join("");
  return `<svg id="trend-svg" class="trend-svg" viewBox="0 0 ${W} ${H}" role="img" aria-label="세션별 종합 점수 추이, 최근 점수 ${last.overall}점">
    ${grid}
    <path d="${path}" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
    <circle cx="${x(li)}" cy="${y(last.overall)}" r="4" fill="var(--accent)" stroke="var(--panel)" stroke-width="2"/>
    <text x="${x(li) + 8}" y="${y(last.overall) + 4}" font-size="11" font-weight="600" fill="var(--text)">${last.overall}</text>
    <text x="${P.l}" y="${H - 6}" font-size="10" fill="var(--muted)">${esc(sessions[0].date)}</text>
    <text x="${W - P.r}" y="${H - 6}" font-size="10" fill="var(--muted)" text-anchor="end">${esc(last.date)}</text>
    <g id="trend-hover" style="display:none" pointer-events="none">
      <line id="th-line" x1="0" x2="0" y1="${P.t}" y2="${H - P.b}" stroke="var(--muted)" stroke-width="1" stroke-dasharray="3 3"/>
      <circle id="th-dot" r="4.5" fill="var(--accent)" stroke="var(--panel)" stroke-width="2"/>
      <g id="th-tip"><rect width="110" height="30" rx="6" fill="var(--tooltip-bg)" opacity="0.94"/>
        <text id="th-date" x="8" y="13" font-size="10" fill="var(--tooltip-fg)" opacity="0.75"></text>
        <text id="th-score" x="8" y="25" font-size="11" font-weight="600" fill="var(--tooltip-fg)"></text></g>
    </g>
  </svg>`;
}
function bindTrendHover(sessions) {
  const svg = el("trend-svg");
  if (!svg || sessions.length < 2) return;
  const W = 640, H = 180, P = { l: 34, r: 46, t: 14, b: 24 };
  const iw = W - P.l - P.r, ih = H - P.t - P.b;
  const x = i => P.l + (i / (sessions.length - 1)) * iw;
  const y = v => P.t + (1 - v / 100) * ih;
  svg.addEventListener("mousemove", e => {
    const rect = svg.getBoundingClientRect();
    const px = ((e.clientX - rect.left) / rect.width) * W;
    const i = Math.max(0, Math.min(sessions.length - 1, Math.round(((px - P.l) / iw) * (sessions.length - 1))));
    const s = sessions[i];
    el("trend-hover").style.display = "";
    el("th-line").setAttribute("x1", x(i)); el("th-line").setAttribute("x2", x(i));
    el("th-dot").setAttribute("cx", x(i)); el("th-dot").setAttribute("cy", y(s.overall));
    el("th-tip").setAttribute("transform", `translate(${Math.min(x(i) + 8, W - 118)}, ${Math.max(y(s.overall) - 34, 2)})`);
    el("th-date").textContent = s.date;
    el("th-score").textContent = s.overall + "점";
  });
  svg.addEventListener("mouseleave", () => { el("trend-hover").style.display = "none"; });
}

        </details>`}
    </div>
    <p class="exam-tip">실전처럼: 질문을 두 번까지만 듣고, 멈추지 말고 90초 이상 말하세요. 전사가 다소 부정확해도 분석 지표에는 큰 영향이 없습니다.${IS_MOBILE ? " 모바일에서는 마이크 제약으로 전사만 되고 답변 녹음 파일(다시 듣기)은 제공되지 않습니다." : ""}</p>`;

  el("quit").onclick = quitExam;
  el("skip").onclick = skipQuestion;
  const rp = el("replay");
  if (rp) rp.onclick = () => { S.replaysLeft--; rp.disabled = true; rp.textContent = "🔁 다시 듣기 (0회 남음)"; speak(q.text); };
  el("show-text").onclick = () => { S.showText = !S.showText; render(); };
  el("live-chk").onchange = e => {
    S.showLive = e.target.checked;
    try { localStorage.setItem("opic_show_live", S.showLive ? "on" : "off"); } catch {}
    render();
  };
  const rs = el("rec-start"); if (rs) rs.onclick = startRecording;
  const rt = el("rec-stop"); if (rt) rt.onclick = submitAnswer;
  const ms = el("manual-submit"); if (ms) ms.onclick = submitManualOnly;
}

function renderResult() {
  const answered = S.answers.filter(a => a.result);
  const avgScores = {};
  for (const k of Object.keys(SCORE_LABELS))
    avgScores[k] = answered.length ? Math.round(answered.reduce((s, a) => s + a.result.scores[k], 0) / answered.length) : 0;
  const overall = answered.length ? Math.round(answered.reduce((s, a) => s + a.result.overall, 0) / answered.length) : 0;
  const grade = gradeEstimate(overall);
  const plan = buildStudyPlan(avgScores);

  const bars = Object.entries(SCORE_LABELS).map(([k, label]) => {
    const v = avgScores[k];
    const lv = v >= 75 ? "good" : v >= 50 ? "warn" : "bad";
    return `<div class="bar-row"><span class="bar-label">${label}</span>
      <span class="bar-track"><span class="bar-fill" style="width:${v}%"></span></span>
      <span class="bar-val ${lv}">${v} ${lv === "good" ? "✓" : lv === "warn" ? "△" : "✗"}</span></div>`;
  }).join("");

  const planHTML = plan.length ? `
    <div class="section-title">이것부터 공부하세요 — 맞춤 학습 플랜</div>
    <div class="plan-grid">${plan.map(p => `
      <div class="plan-card"><div class="plan-title">${esc(p.title)}</div>
        <ul>${p.items.map(it => `<li>${esc(it)}</li>`).join("")}</ul></div>`).join("")}</div>` : "";

  const details = S.answers.map((a, i) => {
    if (!a.result)
      return `<div class="ans-card skipped"><div class="ans-head"><b>Q${i + 1}.</b> <span class="q-cat">${esc(a.q.cat || "")}</span> ${esc(a.q.ko)} — <i>건너뜀</i></div></div>`;
    const m = a.result.metrics;
    const fb = buildFeedback(a.result, a.q).map(f =>
      `<div class="fb-item ${f.lv}"><span class="fb-icon">${f.lv === "good" ? "✓" : f.lv === "warn" ? "△" : "✗"}</span>${esc(f.text)}</div>`).join("");
    return `<div class="ans-card">
      <button class="ans-head" data-toggle="${i}"><b>Q${i + 1}.</b> <span class="q-cat">${esc(a.q.cat || "")}</span> ${esc(a.q.ko)}
        <span class="ans-score">${a.result.overall}점 <span id="arrow-${i}">▸</span></span></button>
      <div class="ans-body" id="body-${i}" style="display:none">
        <div class="metric-chips"><span>⏱ ${m.durationSec}초</span><span>📝 ${m.wordCount}단어</span><span>🚀 ${m.wpm} WPM</span>
          <span>🔗 연결어 ${m.distinctConnectives}종</span><span>🧩 복문 ${m.subCount}회</span><span>😶 필러 ${m.fillerTotal}회</span></div>
        ${a.audioUrl ? `<audio controls src="${a.audioUrl}" class="ans-audio"></audio>` : ""}
        <div class="transcript"><b>전사:</b> ${esc(a.transcript)}</div>
        ${a.rawSegs && a.rawSegs.length ? `<details class="manual-details"><summary>🔧 원본 인식 조각 ${a.rawSegs.length}개 — 전사가 이상할 때 이 내용을 복사해서 알려주세요</summary><div class="transcript">${a.rawSegs.map(s => esc(s)).join(" ⏐ ")}</div></details>` : ""}
        ${m.connectivesFound.length ? `<div class="used-good">✓ 사용한 연결 표현: ${m.connectivesFound.join(", ")}</div>` : ""}
        <div class="fb-list">${fb}</div>
        <div class="rev-zone">
          ${getAiKey()
            ? `<button class="btn stop small" data-airev="${i}">🤖 AI 정밀 첨삭 (문법·논리 전체 교정)</button>
               <button class="btn ghost small" data-rev="${i}">✍️ 기본 첨삭 (규칙 기반)</button>`
            : `<button class="btn stop small" data-rev="${i}">✍️ AL 첨삭 — 수정 전/후 보기</button>
               <span class="rev-hint">문법·논리까지 완전히 잡는 AI 정밀 첨삭은 홈 하단에서 무료 키 등록 후 사용 가능</span>`}
          <div class="rev-out" id="rev-${i}"></div>
        </div>
      </div></div>`;
  }).join("");

  app.innerHTML = `
    <div class="topbar">
      <div class="brand"><span class="dot"></span><span><b>세션 결과</b></span></div>
      <div class="status"><button class="btn ghost small" id="retry">같은 세트 재도전</button>
        <button class="btn ghost small" id="home">홈으로</button></div>
    </div>
    ${answered.length === 0 ? `<p class="chart-empty">분석할 답변이 없습니다. 다음 세션에서는 답변을 녹음(또는 입력)해 보세요.</p>` : `
      <div class="result-hero">
        <div class="hero-score"><div class="hero-num">${overall}</div><div class="hero-sub">/100 · ${answered.length}문항 평균</div></div>
        <div class="hero-grade ${grade.cls}"><div class="hg-label">예상 등급</div>
          <div class="hg-grade">${grade.grade}</div><div class="hg-desc">${grade.desc}</div></div>
      </div>
      <div class="section-title">영역별 진단</div>
      <div class="chart-panel"><div class="bars">${bars}</div></div>
      ${planHTML}
      <div class="section-title">문항별 상세 분석</div>
      ${details}`}`;

  el("home").onclick = () => { S.screen = "home"; render(); };
  el("retry").onclick = () => startExam(S.questions);
  document.querySelectorAll("[data-rev]").forEach(b => {
    b.onclick = () => {
      const i = +b.dataset.rev, a = S.answers[i], out = el("rev-" + i);
      if (out.dataset.mode === "rule") { out.innerHTML = ""; out.dataset.mode = ""; return; }
      const { corrected, issues } = upgradeToAL(a.transcript, a.q);
      const logic = buildLogicNotes(a.transcript, a.q);
      out.innerHTML = revisionHTML(a.transcript, corrected, issues, logic,
        "기본 첨삭 (규칙 기반) — 자주 나오는 오류·구조 중심이며, 모든 문법을 잡지는 못해요");
      out.dataset.mode = "rule";
    };
  });
  document.querySelectorAll("[data-airev]").forEach(b => {
    b.onclick = async () => {
      const i = +b.dataset.airev, a = S.answers[i], out = el("rev-" + i);
      b.disabled = true; b.textContent = "🤖 AI 분석 중… (몇 초 걸려요)";
      out.innerHTML = `<p class="rev-title">🤖 Gemini가 문법·논리를 검토하는 중…</p>`;
      try {
        const r = await aiReview(a.transcript, a.q);
        const issues = (r.grammar || []).map(g => ({ kind: "문법", from: g.from, to: g.to, note: g.why }));
        out.innerHTML = `<div class="ai-badge">🤖 AI 정밀 첨삭 결과 (${esc(r.__model || "Gemini")})</div>` +
          revisionHTML(a.transcript, r.corrected || a.transcript, issues,
            [...(r.logic || []), ...(r.tips || [])], "문법·내용 논리까지 검토한 교정입니다");
        out.dataset.mode = "ai";
      } catch (e) {
        const diag = (e.attempts && e.attempts.length)
          ? `<div class="ai-diag">${e.attempts.map(a2 => `· ${esc(a2.model)} → ${a2.status}`).join("<br>")}</div>` : "";
        out.innerHTML = `<p class="mic-err">⚠ AI 첨삭 실패: ${esc(e.message)}</p>${diag}<p class="rev-hint">우선 아래 기본 첨삭을 이용하세요. 문제가 계속되면 위 내용을 복사해 알려주세요.</p>
          <button class="btn ghost small" data-rev="${i}">✍️ 기본 첨삭으로 보기</button>`;
        const rb = out.querySelector("[data-rev]");
        if (rb) rb.onclick = () => {
          const { corrected, issues } = upgradeToAL(a.transcript, a.q);
          out.innerHTML = revisionHTML(a.transcript, corrected, issues, buildLogicNotes(a.transcript, a.q), "기본 첨삭 (규칙 기반)");
        };
      }
      b.disabled = false; b.textContent = "🤖 AI 정밀 첨삭 (문법·논리 전체 교정)";
    };
  });
  document.querySelectorAll("[data-toggle]").forEach(b => {
    b.onclick = () => {
      const i = b.dataset.toggle;
      const body = el("body-" + i), arrow = el("arrow-" + i);
      const open = body.style.display !== "none";
      body.style.display = open ? "none" : "";
      arrow.textContent = open ? "▸" : "▾";
    };
  });
}

render();
</script>

</body>
</html>
